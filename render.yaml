services:
  - type: web
    name: medicare-hms
    env: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build && cd ../server && npm install && npx prisma generate && npm run build && node prisma/seed.js
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /health